name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check argus/

      - name: Security lint (bandit)
        run: bandit -r argus/ -ll --exclude argus/dashboard/static

      - name: Run tests
        run: pytest tests/ -v --tb=short
        continue-on-error: true  # tests are sparse — don't block PRs until coverage improves
