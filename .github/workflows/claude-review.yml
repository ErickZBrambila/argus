name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropic/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            Review this pull request for Argus — an AI trading agent that connects to Robinhood.

            Focus on:
            1. **Security**: credential leaks, injection risks, unsafe eval/exec, unvalidated external data, API key exposure
            2. **Trading safety**: any logic that could cause unintended real-money orders, bypass the paper-trade flag, skip stop-losses, or ignore the kill switch
            3. **EDGAR/yfinance correctness**: rate limit compliance, correct field names, parser edge cases
            4. **Correctness bugs**: off-by-one, None handling, race conditions in the thread pool

            Be concise — 3–8 findings max. Skip style nits. Flag anything that could touch real money with HIGH RISK.
